<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="data_v2.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            line-height: 1.5;
            background: #01164B; 
            color: #fff;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            padding: 95px 10px 100px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.2) 0%, transparent 50%), 
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.2) 0%, transparent 50%);
            z-index: -1;
        }

        .top-navbar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(1, 22, 75, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 700;
            background: rgba(255,255,255,0.08);
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .spacer { flex-grow: 1; }

        .divider-card {
            grid-column: span 2 !important;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 28px;
            height: 120px;
            cursor: default;
            user-select: none;
            display: flex;
            align-items: center;
            padding: 0 25px;
            gap: 20px;
            margin-bottom: 8px;
        }

        .divider-image {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }

        .divider-title {
            font-family: 'Montserrat', 'Cairo', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #000000;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 5px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        .category-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            transition: all 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            scroll-margin-top: 100px;
        }

        .category-card.full-width { grid-column: span 2; }
        
        .category-card.active {
            grid-column: span 2 !important;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255,255,255,0.4);
        }

        .category-card-banner {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .category-title {
            font-family: 'Montserrat', 'Cairo', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .subcategory-list.active { max-height: 10000px; }
        
        .close-header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 25px 5px;
        }
        [dir="rtl"] .close-header { justify-content: flex-start; }

        .icon-close-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .menu-item {
            padding: 25px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.15);
        }

        .item-image-container {
            width: 100%; height: 250px;
            border-radius: 22px; overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .item-thumb { width:100%; height:100%; object-fit: cover; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            direction: rtl !important;
        }

        .item-name { font-size: 1.4rem; color: #fff; font-weight: 700; margin: 0; }
        .item-price { font-size: 1.2rem; font-weight: 800; color: #ffbc00; }
        .item-description {
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            text-align: right !important;
            direction: rtl !important;
        }

        .close-section {
            padding: 30px;
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 14px 45px;
            border-radius: 35px;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
        }

        .order-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .order-toast.show { bottom: 25px; }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .toast-icon {
            font-size: 1.4rem;
        }

        .toast-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        @media (max-width: 480px) {
            body { padding: 85px 8px 100px; }
            .categories-grid { gap: 10px; margin-top: 0; }
            .category-title { font-size: 1.1rem; }
            .item-image-container { height: 200px; }
            .order-toast { width: 95%; padding: 10px 16px; }
            .toast-content { font-size: 0.8rem; }
            .top-navbar { padding: 0 12px; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <a href="index.html" class="menu-button">Home</a>
        </div>
    </header>

    <div class="container">
        <div class="categories-grid" id="menu-container"></div>
    </div>

    <!-- Floating Info Bar -->
    <div id="order-toast" class="order-toast">
        <div class="toast-content">
            <span class="toast-icon">🛎️</span>
            <span id="toast-text">Please place your order at the cashier</span>
        </div>
        <button class="toast-close" onclick="dismissToast()">×</button>
    </div>

    <script>
        let currentLang = localStorage.getItem('anima_lang') || 'en';
        const dir = localStorage.getItem('anima_lang') === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.dir = dir;

        function dismissToast() {
            document.getElementById('order-toast').classList.remove('show');
        }

        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.parentElement;
            if(list.classList.contains('active')) {
                list.classList.remove('active');
                card.classList.remove('active');
                return;
            }
            document.querySelectorAll('.subcategory-list.active').forEach(item => {
                item.classList.remove('active');
                item.parentElement.classList.remove('active');
            });
            list.classList.add('active');
            card.classList.add('active');
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        function closeCategory(e, id) {
            e.stopPropagation();
            const list = document.getElementById(id);
            const card = list.parentElement;
            list.classList.remove('active');
            card.classList.remove('active');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            // Drinks divider
            const drinksDiv = document.createElement('div');
            drinksDiv.className = 'divider-card';
            const drinksImg = document.createElement('img');
            drinksImg.src = 'drinks/divider-drinks.png';
            drinksImg.className = 'divider-image';
            drinksImg.alt = 'Drinks';
            const drinksTitleEl = document.createElement('div');
            drinksTitleEl.className = 'divider-title';
            drinksTitleEl.textContent = currentLang === 'ar' ? 'المشروبات' : 'DRINKS';
            drinksDiv.appendChild(drinksImg);
            drinksDiv.appendChild(drinksTitleEl);
            container.appendChild(drinksDiv);

            if (typeof ANIMA_DATA === 'undefined') return;

            ANIMA_DATA.categories.forEach((category, index) => {
                // Food divider before pizza (index 4)
                if (index === 4) {
                    const foodDiv = document.createElement('div');
                    foodDiv.className = 'divider-card';
                    const foodImg = document.createElement('img');
                    foodImg.src = 'food/divider-food.png';
                    foodImg.className = 'divider-image';
                    foodImg.alt = 'Food';
                    const foodTitleEl = document.createElement('div');
                    foodTitleEl.className = 'divider-title';
                    foodTitleEl.textContent = currentLang === 'ar' ? 'المأكولات' : 'FOOD';
                    foodDiv.appendChild(foodImg);
                    foodDiv.appendChild(foodTitleEl);
                    container.appendChild(foodDiv);
                }

                const card = document.createElement('div');
                card.className = 'category-card' + (index % 3 === 0 ? ' full-width' : '');
                card.id = 'card-' + category.id;
                card.onclick = () => toggleCategory(category.id);

                const banner = document.createElement('div');
                banner.className = 'category-card-banner';
                const titleDiv = document.createElement('div');
                titleDiv.className = 'category-title';
                titleDiv.textContent = category.title[currentLang] || category.title.en;
                banner.appendChild(titleDiv);
                card.appendChild(banner);

                const list = document.createElement('div');
                list.id = category.id;
                list.className = 'subcategory-list';
                list.onclick = (e) => e.stopPropagation();

                const closeHeader = document.createElement('div');
                closeHeader.className = 'close-header';
                const closeBtn = document.createElement('button');
                closeBtn.className = 'icon-close-btn';
                closeBtn.onclick = (e) => closeCategory(e, category.id);
                closeBtn.textContent = '×';
                closeHeader.appendChild(closeBtn);
                list.appendChild(closeHeader);

                category.items.forEach(item => {
                    const menuItem = document.createElement('div');
                    menuItem.className = 'menu-item';

                    if (item.image) {
                        const imgContainer = document.createElement('div');
                        imgContainer.className = 'item-image-container';
                        const img = document.createElement('img');
                        img.src = item.image;
                        img.className = 'item-thumb';
                        img.loading = 'lazy';
                        imgContainer.appendChild(img);
                        menuItem.appendChild(imgContainer);
                    }

                    const header = document.createElement('div');
                    header.className = 'item-header';
                    const nameH3 = document.createElement('h3');
                    nameH3.className = 'item-name';
                    nameH3.textContent = item.name;
                    const priceDiv = document.createElement('div');
                    priceDiv.className = 'item-price';
                    priceDiv.textContent = item.price;
                    header.appendChild(nameH3);
                    header.appendChild(priceDiv);
                    menuItem.appendChild(header);

                    if (item.description) {
                        const descP = document.createElement('p');
                        descP.className = 'item-description';
                        descP.textContent = item.description;
                        menuItem.appendChild(descP);
                    }
                    list.appendChild(menuItem);
                });

                const closeSection = document.createElement('div');
                closeSection.className = 'close-section';
                const closeBtn2 = document.createElement('button');
                closeBtn2.className = 'close-btn';
                closeBtn2.onclick = (e) => closeCategory(e, category.id);
                closeBtn2.textContent = 'Close';
                closeSection.appendChild(closeBtn2);
                list.appendChild(closeSection);

                card.appendChild(list);
                container.appendChild(card);
            });
        }
        
        window.onload = () => {
            renderMenu();
            setTimeout(() => {
                document.getElementById('order-toast').classList.add('show');
            }, 2000);
        };
    </script>
</body>
</html>
