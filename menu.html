<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الأصناف - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            line-height: 1.5;
            font-size: 1rem;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);

background: #01164B; color: #fff;
color: #fff; 
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%), radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
  z-index: -1;
}
            direction: rtl;
            padding: 90px 20px 20px;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-weight: 700;
        }
        
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.05); /* very light transparent matching the aesthetic */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .navbar-logo {
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .spacer {
            flex-grow: 1;
        }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .menu-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }



        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 15px;
            margin-top: 20px;
        }
        
.category-card {
background: rgba(1,22,75,0.8);
border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .category-card.full-width { grid-column: span 2; }
        .category-card.half-width { grid-column: span 1; }
.category-card.active {
            grid-column: span 2 !important;
            background: rgba(1,22,75,0.9);
            color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .category-card-banner {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            transition: height 0.4s ease;
            border-bottom: 1px solid transparent;
        }
        .category-card.full-width .category-card-banner {
            height: 120px;
        }
        .category-card.active .category-card-banner {
            height: 120px;
            border-bottom-color: rgba(255,255,255,0.1);
        }
        
.category-title {
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            position: relative;
            z-index: 2;
            margin: 0;
            text-align: center;
            width: 100%;
        }
        
        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            width: 100%;
            transition: max-height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .subcategory-list.active {
            max-height: 6000px;
        }
        
        .subcategory {
            margin: 0;
        }
        
        .menu-item {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.06);
            padding-left: 28px;
            padding-right: 28px;
        }
        .menu-item:last-child { border-bottom: none; }
        .item-image-container {
            width: 100%;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .menu-item:hover .item-image-container {
            transform: scale(1.02);
        }
        .item-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-details {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
        }
.item-name { 
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            flex: 1;
            margin: 0;
            line-height: 1.3;
        }
        .item-price { 
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #f4d03f, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(244,208,63,0.3);
            white-space: nowrap;
            margin-top: 8px;
        }
        .item-description {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            line-height: 1.5;
            margin: 8px 0;
            font-family: 'Cairo', sans-serif;
        }
        
        /* Responsive Improvements for Mobile */
        @media (max-width: 480px) {
            body { padding: 80px 10px 10px; }
            .top-navbar { height: 60px; padding: 0 15px; }
            .navbar-logo { height: 35px; }
            .categories-grid { gap: 10px; grid-template-columns: 1fr !important; }
            .menu-button { padding: 6px 14px; font-size: 0.9em; }
            .category-title { font-size: 1.2em; }
            .menu-item { padding: 20px 16px; }
            .item-name { font-size: 20px; }
            .item-price { font-size: 18px; padding: 6px 16px; }
            .item-image-container { height: 200px; }
            .category-card-banner { height: 80px; padding: 10px; }
            .category-card.full-width, .category-card.active { grid-column: 1 / -1 !important; }
        }
        @media (min-width: 481px) {
            .category-title { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="logo.png" alt="ANIMA Logo" class="navbar-logo">




            </div>
            <div class="spacer"></div>
            <a href="index.html" class="menu-button">
                الرئيسية
            </a>
        </div>
    </header>

    <div class="container">
        <div class="categories-grid" id="menu-container">
            <!-- سيتم توليد الأقسام هنا ديناميكياً من ملف data.js -->
        </div>
    </div>

    <script>
        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.parentElement;
            list.classList.toggle('active');
            card.classList.toggle('active');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            if (typeof ANIMA_DATA === 'undefined' || !ANIMA_DATA.categories) {
                container.innerHTML = '<p style="text-align:center;color:white;">جاري تحميل القائمة...</p>';
                return;
            }

            ANIMA_DATA.categories.forEach((category, index) => {
                let itemsHtml = '';
                category.items.forEach(item => {
                    const itemImage = item.image ? `<img src="${item.image}" class="item-thumb" loading="lazy" alt="${item.name}">` : '';
                    const desc = item.description || 'وصف لذيذ للصنف';
                    itemsHtml += `
                        <div class="menu-item">
                            <div class="item-image-container">
                                ${itemImage}
                            </div>
                            <div class="item-details">
                                <h3 class="item-name">${item.name}</h3>
                                <p class="item-description">${desc}</p>
                                <div class="item-price">${item.price}</div>
                            </div>
                        </div>
                    `;
                });
                
                const cardClass = (index % 3 === 0) ? 'full-width' : 'half-width';

                const cardHtml = `
                    <div class="category-card ${cardClass}" onclick="toggleCategory('${category.id}')">
                        <div class="category-card-banner">
                            <div class="category-title">${category.title}</div>
                        </div>
                        <div class="subcategory-list" id="${category.id}" onclick="event.stopPropagation()">
                            <div class="subcategory">
                                ${itemsHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        window.addEventListener('load', () => {
            renderMenu();
        });
    </script>
</body>
</html>
