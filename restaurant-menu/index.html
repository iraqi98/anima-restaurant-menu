<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA CAFÉ & PIZZERIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
background: #01164B;
            color: #fff; 
            line-height: 1.5;
            direction: rtl;
            min-height: 100vh;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        
        .main-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .logo {
            max-width: 220px;
            max-height: 150px;
            width: auto;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
            opacity: 0;
            animation: fadeIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        h1 { 
            font-size: clamp(2em, 8vw, 3em); 
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-weight: 700; 
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8); 
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
        }
        
        .event-section {
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 18px 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.7s forwards;
        }
        
        .event-section:hover {
            transform: scale(1.02) translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .event-details {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        
        .event-section.active .event-details {
            opacity: 1;
            max-height: 100px;
            margin-top: 10px;
        }
        
        .event-title {
            font-size: 1.4em;
            font-weight: 700;
            opacity: 0.95;
            margin: 0;
        }
        
        .event-date {
            font-size: clamp(1em, 3.5vw, 1.2em);
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            padding-top: 5px;
        }
        
        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.4em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-decoration: none;
            display: inline-block;
            width: 90%;
            max-width: 400px;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .menu-btn.primary {
            background: linear-gradient(135deg, rgba(76, 0, 0, 0.7), rgba(1, 22, 75, 0.7));
            border-color: rgba(255,255,255,0.3);
        }
        
        .menu-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="main-page">
src="390c0c95-c085-4190-9d08-971acfc6a118.jpg"
        <h1>ANIMA CAFÉ & PIZZERIA</h1>
        
        <a href="menu.html" class="menu-btn primary">قائمة الأصناف</a>
        
        <div class="event-section" onclick="toggleEventDetails()">
            <p class="event-title" id="eventName">Event</p>
            <div class="event-details">
                <p class="event-date" id="eventDate">التاريخ: YYYY-MM-DD</p>
            </div>
        </div>
    </div>
    <script src="data.js"></script>
    <script>
        document.getElementById('eventName').textContent = ANIMA_DATA.event.name;
        document.getElementById('eventDate').textContent = ANIMA_DATA.event.date;
        
        function toggleEventDetails() {
            document.querySelector('.event-section').classList.toggle('active');
        }
    </script>
</body>
</html>
