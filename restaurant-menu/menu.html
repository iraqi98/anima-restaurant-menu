<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="data_v2.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            line-height: 1.5;
            background: #01164B; 
            color: #fff;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            padding: 90px 15px 20px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.2) 0%, transparent 50%), 
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.2) 0%, transparent 50%);
            z-index: -1;
        }

        .top-navbar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(1, 22, 75, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar-logo { height: 40px; object-fit: contain; }

        .spacer { flex-grow: 1; }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .menu-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        
        .category-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .category-card.full-width { grid-column: span 2; }
        
        .category-card:active { transform: scale(0.96); }

        .category-card.active {
            grid-column: span 2 !important;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255,255,255,0.3);
        }

        .category-card-banner {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .category-title {
            font-family: 'Montserrat', 'Cairo', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .category-card.full-width .category-title { font-size: 1.5rem; }
        
        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s ease-in-out;
            display: flex;
            flex-direction: column;
        }
        .subcategory-list.active { max-height: 8000px; }
        
        .menu-item {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.1);
        }

        .item-image-container {
            width: 100%; height: 220px;
            border-radius: 18px; overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .item-thumb { width:100%; height:100%; object-fit: cover; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        [dir="rtl"] .item-header { direction: rtl; }
        [dir="ltr"] .item-header { direction: ltr; }

        .item-name { font-size: 1.3rem; color: #fff; font-weight: 700; }
        .item-price { font-size: 1.1rem; font-weight: 800; color: #f39c12; }
        .item-description {
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }
        [dir="rtl"] .item-description { text-align: right; direction: rtl; }
        [dir="ltr"] .item-description { text-align: left; direction: ltr; }

        .close-section {
            padding: 25px;
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .categories-grid { gap: 10px; }
            .category-title { font-size: 1rem; }
            .category-card.full-width .category-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="anima_logo.png" alt="ANIMA Logo" class="navbar-logo">
            </div>
            <div class="spacer"></div>
            <div class="nav-buttons">
                <button id="lang-btn" class="menu-button" onclick="toggleLanguage()">AR</button>
                <a href="index.html" id="home-link" class="menu-button">Home</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="categories-grid" id="menu-container"></div>
    </div>

    <script>
        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'ar' : 'en';
            updateUI();
        }

        function updateUI() {
            const isAr = (currentLang === 'ar');
            document.documentElement.lang = currentLang;
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            
            document.getElementById('lang-btn').textContent = isAr ? 'EN' : 'AR';
            document.getElementById('home-link').textContent = ANIMA_UI[currentLang].home;

            renderMenu();
        }

        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.parentElement;
            
            if(list.classList.contains('active')) {
                list.classList.remove('active');
                card.classList.remove('active');
                return;
            }

            document.querySelectorAll('.subcategory-list.active').forEach(item => {
                item.classList.remove('active');
                item.parentElement.classList.remove('active');
            });

            list.classList.add('active');
            card.classList.add('active');
            
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        function closeCategory(e, id) {
            e.stopPropagation();
            const list = document.getElementById(id);
            const card = list.parentElement;
            list.classList.remove('active');
            card.classList.remove('active');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            if (typeof ANIMA_DATA === 'undefined') {
                container.innerHTML = `<p style="text-align:center;color:white;">${ANIMA_UI[currentLang].loading}</p>`;
                return;
            }

            ANIMA_DATA.categories.forEach((category, index) => {
                const itemsHtml = category.items.map(item => `
                    <div class="menu-item">
                        ${item.image ? `<div class="item-image-container"><img src="${item.image}" class="item-thumb" loading="lazy"></div>` : ''}
                        <div class="item-header">
                            <h3 class="item-name">${item.name}</h3>
                            <div class="item-price">${item.price}</div>
                        </div>
                        <p class="item-description">${item.description || ''}</p>
                    </div>
                `).join('');
                
                const isFull = (index % 3 === 0);
                const cardClass = isFull ? 'full-width' : 'half-width';
                const title = category.title[currentLang];
                const closeText = ANIMA_UI[currentLang].close;

                container.innerHTML += `
                    <div class="category-card ${cardClass}" onclick="toggleCategory('${category.id}')">
                        <div class="category-card-banner">
                            <div class="category-title">${title}</div>
                        </div>
                        <div class="subcategory-list" id="${category.id}" onclick="event.stopPropagation()">
                            ${itemsHtml}
                            <div class="close-section">
                                <button class="close-btn" onclick="closeCategory(event, '${category.id}')">${closeText}</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        window.onload = () => updateUI();
    </script>
</body>
</html>
