<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="data_v2.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            line-height: 1.5;
            background: #01164B; 
            color: #fff;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            direction: ltr;
            padding: 90px 15px 20px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.2) 0%, transparent 50%), 
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.2) 0%, transparent 50%);
            z-index: -1;
        }

        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(1, 22, 75, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar-logo {
            height: 40px;
            object-fit: contain;
        }

        .spacer { flex-grow: 1; }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        
        .category-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .category-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .category-card.full-width { grid-column: span 2; }
        
        .category-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }

        .category-card.active {
            grid-column: span 2 !important;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .category-card-banner {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }
        
        .category-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .category-card.full-width .category-title {
            font-size: 1.5rem;
        }
        
        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s ease-in-out;
        }
        .subcategory-list.active {
            max-height: 5000px;
        }
        
        .menu-item {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.1);
        }

        .item-image-container {
            width: 100%;
            height: 220px;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .item-thumb { width:100%; height:100%; object-fit: cover; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            direction: rtl;
        }
        .item-name { font-size: 1.3rem; color: #fff; font-weight: 700; }
        .item-price { 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: #f39c12; 
        }
        .item-description {
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            direction: rtl;
            text-align: right;
        }

        @media (min-width: 600px) {
            .categories-grid { gap: 20px; }
            .body { padding: 100px 40px 40px; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="anima_logo.png" alt="ANIMA Logo" class="navbar-logo">
            </div>
            <div class="spacer"></div>
            <a href="index.html" class="menu-button">Home</a>
        </div>
    </header>

    <div class="container">
        <div class="categories-grid" id="menu-container"></div>
    </div>

    <script>
        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.parentElement;
            
            // Close other active categories
            document.querySelectorAll('.subcategory-list.active').forEach(item => {
                if(item.id !== id) {
                    item.classList.remove('active');
                    item.parentElement.classList.remove('active');
                }
            });

            list.classList.toggle('active');
            card.classList.toggle('active');
            
            if(card.classList.contains('active')) {
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 300);
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            if (typeof ANIMA_DATA === 'undefined') return;

            ANIMA_DATA.categories.forEach((category, index) => {
                const itemsHtml = category.items.map(item => `
                    <div class="menu-item">
                        ${item.image ? `<div class="item-image-container"><img src="${item.image}" class="item-thumb" loading="lazy"></div>` : ''}
                        <div class="item-header">
                            <h3 class="item-name">${item.name}</h3>
                            <div class="item-price">${item.price}</div>
                        </div>
                        <p class="item-description">${item.description || ''}</p>
                    </div>
                `).join('');
                
                // Pattern: 1 Full, 2 Half, 1 Full, 2 Half...
                const isFull = (index % 3 === 0);
                const cardClass = isFull ? 'full-width' : 'half-width';

                container.innerHTML += `
                    <div class="category-card ${cardClass}" onclick="toggleCategory('${category.id}')">
                        <div class="category-card-banner">
                            <div class="category-title">${category.title}</div>
                        </div>
                        <div class="subcategory-list" id="${category.id}" onclick="event.stopPropagation()">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            });
        }
        renderMenu();
    </script>
</body>
</html>
