<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الأصناف - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            line-height: 1.5;
            font-size: 1rem;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);

background: #01164B;
color: #fff; 
            direction: rtl;
            padding: 90px 20px 20px;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-weight: 700;
        }
        
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.05); /* very light transparent matching the aesthetic */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .navbar-logo {
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .spacer {
            flex-grow: 1;
        }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .menu-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }



        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 15px;
            margin-top: 20px;
        }
        
        .category-card {
background: rgba(255,255,255,0.08);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .category-card.full-width { grid-column: span 2; }
        .category-card.half-width { grid-column: span 1; }
        .category-card.active {
            grid-column: span 2 !important;
            background: #4C0000;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .category-card-banner {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            transition: height 0.4s ease;
            border-bottom: 1px solid transparent;
        }
        .category-card.full-width .category-card-banner {
            height: 120px;
        }
        .category-card.active .category-card-banner {
            height: 120px;
            border-bottom-color: rgba(255,255,255,0.1);
        }
        
        .category-title {
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            position: relative;
            z-index: 2;
            margin: 0;
            text-align: center;
            width: 100%;
        }
        
        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            width: 100%;
            transition: max-height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .subcategory-list.active {
            max-height: 6000px;
        }
        
        .subcategory {
            margin: 0;
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            font-size: 1.15em;
            font-weight: 600;
        }
        .menu-item:last-child { border-bottom: none; }
        .item-info { display: flex; align-items: center; flex: 1; }
        .item-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            margin-left: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            background-color: rgba(255,255,255,0.1);
        }
        .item-name { 
            flex: 1; 
            padding-left: 10px; 
            color: #ffffff; 
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-size: 20px;
            font-weight: 500;
        }
        .item-price { 
            font-family: 'Roboto', 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 400; 
            color: #ffffff; 
            min-width: 80px;
            text-align: left;
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }
        
        /* Responsive Improvements for Mobile */
        @media (max-width: 480px) {
            body { padding: 80px 10px 10px; }
            .top-navbar { height: 60px; padding: 0 15px; }
            .navbar-logo { height: 35px; }
            .categories-grid { gap: 10px; }
            .menu-button { padding: 6px 14px; font-size: 0.9em; }
            .item-name { font-size: 0.9em; }
            .item-price { font-size: 0.85em; padding: 3px 8px; min-width: 60px; }
            .category-title { font-size: 1.2em; }
            .item-thumb { width: 40px; height: 40px; border-radius: 6px; margin-left: 8px; }
            .menu-item { padding: 12px 10px; }
            .category-card-banner { height: 80px; padding: 10px; }
            .category-card.full-width .category-card-banner { height: 100px; }
            .category-card.active .category-card-banner { height: 100px; }
        }
        @media (min-width: 481px) {
            .category-title { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="logo.png" alt="ANIMA Logo" class="navbar-logo">




            </div>
            <div class="spacer"></div>
            <a href="index.html" class="menu-button">
                الرئيسية
            </a>
        </div>
    </header>

    <div class="container">
        <div class="categories-grid" id="menu-container">
            <!-- سيتم توليد الأقسام هنا ديناميكياً من ملف data.js -->
        </div>
    </div>

    <script>
        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.parentElement;
            list.classList.toggle('active');
            card.classList.toggle('active');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            if (typeof ANIMA_DATA === 'undefined' || !ANIMA_DATA.categories) {
                container.innerHTML = '<p style="text-align:center;color:white;">جاري تحميل القائمة...</p>';
                return;
            }

            ANIMA_DATA.categories.forEach((category, index) => {
                let itemsHtml = '';
                category.items.forEach(item => {
                    const itemImage = item.image ? `<img src="${item.image}" class="item-thumb" loading="lazy">` : '';
                    itemsHtml += `
                        <div class="menu-item">
                            <div class="item-info">
                                ${itemImage}
                                <span class="item-name">${item.name}</span>
                            </div>
                            <span class="item-price">${item.price}</span>
                        </div>
                    `;
                });
                
                const cardClass = (index % 3 === 0) ? 'full-width' : 'half-width';

                const cardHtml = `
                    <div class="category-card ${cardClass}" onclick="toggleCategory('${category.id}')">
                        <div class="category-card-banner">
                            <div class="category-title">${category.title}</div>
                        </div>
                        <div class="subcategory-list" id="${category.id}" onclick="event.stopPropagation()">
                            <div class="subcategory">
                                ${itemsHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        window.addEventListener('load', () => {
            renderMenu();
        });
    </script>
</body>
</html>
