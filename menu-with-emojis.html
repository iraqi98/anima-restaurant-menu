
<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@700;800&family=Cairo:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="data_v2.js"></script>




    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', 'Cairo', sans-serif;
            line-height: 1.5;
            background: #01164B;
            color: #fff;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            padding: 95px 10px 100px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.2) 0%, transparent 50%);
            z-index: -1;
        }

        /* Ultra Calm Faded White Waves */
        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px; /* Shorter waves */
            z-index: 0;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            pointer-events: none;
            overflow: hidden;
        }

        .wave-container.playing {
            opacity: 0.15 !important; /* Extremely faded */
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0 50 Q 250 0 500 50 T 1000 50 L 1000 100 L 0 100 Z" fill="%23ffffff"/></svg>') repeat-x;
            background-size: 50% 100%;
            animation: waveMove 15s linear infinite; /* Very slow */
            opacity: 0.4;
            filter: blur(10px); /* Soft edges */
        }

        .wave2 {
            bottom: -5px;
            opacity: 0.2;
            animation-duration: 25s; /* Ultra slow */
            animation-direction: reverse;
        }

        .wave3 {
            bottom: -15px;
            opacity: 0.1;
            animation-duration: 35s; /* Almost stationary */
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: rgba(1, 22, 75, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .spacer {
            flex-grow: 1;
        }

        .divider-card {
            grid-column: span 2 !important;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 28px;
            height: 120px;
            cursor: default;
            user-select: none;
            display: flex;
            align-items: center;
            padding: 0 25px;
            gap: 20px;
            margin-bottom: 8px;
        }

        .divider-image {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .divider-title {
            font-family: 'Montserrat', 'Cairo', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #000000;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sparkle Effect */
        .sparkle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ffbc00;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ffbc00, 0 0 20px #ffbc00;
            animation: sparkleAnim 0.8s ease-out forwards;
            z-index: 9999;
        }

        @keyframes sparkleAnim {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -80px) scale(1.5);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -120px) scale(0);
                opacity: 0;
            }
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 5px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            scroll-margin-top: 100px;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .category-card:active {
            transform: scale(0.96);
        }

        .category-card.full-width {
            grid-column: span 2;
        }

        .category-card.active {
            grid-column: span 2 !important;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1) !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .category-card-banner {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .category-title {
            font-family: 'Montserrat', 'Cairo', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .subcategory-list.active {
            max-height: 10000px;
        }

        .close-header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 25px 5px;
        }

        [dir="rtl"] .close-header {
            justify-content: flex-start;
        }

        .icon-close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .menu-item {
            padding: 25px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.15);
        }

        .item-image-container {
            width: 100%;
            height: 250px;
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .item-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            direction: rtl !important;
        }

        .item-name {
            font-size: 1.4rem;
            color: #fff;
            font-weight: 700;
            margin: 0;
        }

        .item-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffbc00;
        }

        .item-description {
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            text-align: right !important;
            direction: rtl !important;
        }

        .close-section {
            padding: 30px;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px 45px;
            border-radius: 35px;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
        }

        .order-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .order-toast.show {
            bottom: 25px;
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .toast-icon {
            font-size: 1.4rem;
        }

        .toast-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        @media (max-width: 480px) {
            body {
                padding: 85px 8px 100px;
            }

            .categories-grid {
                gap: 10px;
                margin-top: 0;
            }

            .category-title {
                font-size: 1.1rem;
            }

            .item-image-container {
                height: 200px;
            }

            .order-toast {
                width: 95%;
                padding: 10px 16px;
            }

            .toast-content {
                font-size: 0.8rem;
            }

            .top-navbar {
                padding: 0 12px;
            }

            #music-btn {
                width: 34px;
                height: 34px;
            }
        }

        /* Music & Trail CSS */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 188, 0, 0.5);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 188, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 188, 0, 0);
            }
        }

        #music-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            margin-inline-end: 10px;
            transition: all 0.3s;
        }

        .glow-trail {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffbc00;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffbc00, 0 0 25px #ffbc00;
            animation: trailFade 0.4s linear forwards;
            z-index: 9998;
        }

        @keyframes trailFade {
            0% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2);
            }
        }

        /* Music Waves Visualizer */
        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
            overflow: hidden;
        }

        .wave-container.playing {
            opacity: 0.4 !important;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0 50 Q 250 0 500 50 T 1000 50 L 1000 100 L 0 100 Z" fill="%23ffbc00"/></svg>') repeat-x;
            background-size: 50% 100%;
            animation: waveMove 3s linear infinite;
        }

        .wave2 {
            bottom: -10px;
            opacity: 0.5;
            animation-duration: 5s;
            animation-direction: reverse;
            filter: hue-rotate(20deg);
        }

        .wave3 {
            bottom: -20px;
            opacity: 0.3;
            animation-duration: 7s;
            filter: hue-rotate(-20deg);
        }

        @keyframes waveMove {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* Cinematic Page Enter */
        .page-enter-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #01164B;
            z-index: 999999;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
            opacity: 1;
        }

        .page-enter-transition.loaded {
            opacity: 0;
        }

        /* Cinematic Spotlight Style */
        .spotlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .spotlight-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spotlight-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: scale(0.8) translateY(30px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            text-align: center;
        }

        .spotlight-overlay.active .spotlight-card {
            transform: scale(1) translateY(0);
        }

        .spotlight-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .spotlight-name {
            font-family: 'Montserrat', 'Cairo', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
        }

        .spotlight-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffbc00;
            margin-bottom: 20px;
            display: inline-block;
            background: rgba(255, 188, 0, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
        }

        .spotlight-desc {
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Favorites System Styles */
        .favorite-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .favorite-btn.active {
            background: rgba(255, 59, 105, 0.2);
            border-color: #ff3b69;
            color: #ff3b69;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 59, 105, 0.4);
        }

        .favorite-btn i {
            transition: transform 0.3s ease;
        }

        .favorite-btn:active i {
            transform: scale(1.5);
        }

        .favorites-section {
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .favorites-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff3b69;
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-family: 'Cairo', sans-serif;
        }

        .spotlight-favorite {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .spotlight-favorite.active {
            background: #ff3b69;
            border-color: #ff3b69;
        }

        .spotlight-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .spotlight-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
    </style>
</head>

<body>
    <div class="page-enter-transition" id="page-enter"></div>

    <header class="top-navbar">
        <div class="navbar-content">
            <button id="music-btn" class="menu-button" onclick="toggleMusic()" title="Play Ambience">
                <i class="fas fa-music"></i>
            </button>
            <a href="index.html" class="menu-button" id="home-btn">Home</a>
            <button id="lang-btn" class="menu-button" onclick="toggleLanguage()">AR</button>
        </div>
    </header>

    <div class="wave-container" id="music-waves">
        <div class="wave wave3"></div>
        <div class="wave wave2"></div>
        <div class="wave"></div>
    </div>

    <audio id="ambient-audio" loop>
        <source
            src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3"
            type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="categories-grid" id="menu-container"></div>
    </div>

    <!-- Cinematic Spotlight Overlay -->
    <div id="spotlight-overlay" class="spotlight-overlay" onclick="closeSpotlight()">
        <div class="spotlight-card" onclick="event.stopPropagation()">
            <button class="spotlight-close" onclick="closeSpotlight()">×</button>
            <div id="spotlight-content"></div>
        </div>
    </div>

    <!-- Floating Info Bar -->
    <div id="order-toast" class="order-toast">
        <div class="toast-content">
            <span class="toast-icon">🛎️</span>
            <span id="toast-text">Please place your order at the cashier</span>
        </div>
        <button class="toast-close" onclick="dismissToast()">×</button>
    </div>

    <script>
        let currentLang = localStorage.getItem('anima_lang') || 'en';
        let favorites = JSON.parse(localStorage.getItem('anima_favorites') || '[]');

        function toggleFavorite(e, itemId) {
            e.stopPropagation();
            const index = favorites.indexOf(itemId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(itemId);
            }
            localStorage.setItem('anima_favorites', JSON.stringify(favorites));
            renderMenu();
            
            // If spotlight is open, update it too
            const spotlightFav = document.querySelector('.spotlight-favorite');
            if (spotlightFav) {
                const isActive = favorites.includes(itemId);
                spotlightFav.classList.toggle('active', isActive);
                spotlightFav.querySelector('span').textContent = isActive ? 
                    (currentLang === 'ar' ? 'في المفضلة' : 'In Favorites') : 
                    (currentLang === 'ar' ? 'إضافة للمفضلة' : 'Add to Favorites');
            }
        }
        let isMusicPlaying = false;
        const ambientAudio = document.getElementById('ambient-audio');
        const musicWaves = document.getElementById('music-waves');
        const musicBtn = document.getElementById('music-btn');

        function toggleMusic(forcePlay = false) {
            if (isMusicPlaying && !forcePlay) {
                ambientAudio.pause();
                musicWaves.classList.remove('playing');
                if (musicBtn) musicBtn.innerHTML = '<i class="fas fa-music"></i>';
                isMusicPlaying = false;
            } else {
                ambientAudio.play().then(() => {
                    musicWaves.classList.add('playing');
                    if (musicBtn) musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    isMusicPlaying = true;
                }).catch(e => console.log("Autoplay blocked, waiting for interaction"));
            }
        }

        // Start music on first interaction
        const startOnInteraction = () => {
            if (!isMusicPlaying) toggleMusic(true);
            document.removeEventListener('click', startOnInteraction);
            document.removeEventListener('touchstart', startOnInteraction);
        };
        document.addEventListener('click', startOnInteraction);
        document.addEventListener('touchstart', startOnInteraction);

        function applyLanguage() {
            const isAr = currentLang === 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            const langBtn = document.getElementById('lang-btn');
            if (langBtn) {
                langBtn.textContent = isAr ? 'EN' : 'AR';
            }

            if (window.ANIMA_UI) {
                const ui = window.ANIMA_UI[currentLang];
                const homeBtn = document.getElementById('home-btn');
                const toastText = document.getElementById('toast-text');
                if (homeBtn && ui.home) homeBtn.textContent = ui.home;
                if (toastText && ui.orderTip) toastText.textContent = ui.orderTip;
            }

            renderMenu();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('anima_lang', currentLang);
            applyLanguage();
        }

        window.addEventListener('storage', (event) => {
            if (event.key === 'anima_lang' && event.newValue) {
                currentLang = event.newValue;
                applyLanguage();
            }
        });

        function dismissToast() {
            document.getElementById('order-toast').classList.remove('show');
        }

        function showSpotlight(item, categoryId) {
            const itemName = typeof item.name === 'object' ? (item.name[currentLang] || item.name.en) : item.name;
            const itemKey = `${categoryId}-${itemName}`;
            const isFav = favorites.includes(itemKey);
            const overlay = document.getElementById('spotlight-overlay');
            const content = document.getElementById('spotlight-content');
            
            content.innerHTML = `
                ${item.image ? `<img src="${item.image}" class="spotlight-img" alt="${itemName}">` : ''}
                <div class="spotlight-favorite ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${itemKey}')">
                    <i class="fas fa-heart"></i>
                    <span>${isFav ? (currentLang === 'ar' ? 'في المفضلة' : 'In Favorites') : (currentLang === 'ar' ? 'إضافة للمفضلة' : 'Add to Favorites')}</span>
                </div>
                <h2 class="spotlight-name">${itemName}</h2>
                <div class="spotlight-price">${item.price}</div>
                <div class="spotlight-desc">${item.description || ''}</div>
                <button class="close-btn" onclick="closeSpotlight()" style="width: 100%">${currentLang === 'ar' ? 'إغلاق' : 'CLOSE'}</button>
            `;
            
            overlay.classList.add('active');
        }

        function closeSpotlight() {
            const overlay = document.getElementById('spotlight-overlay');
            overlay.classList.remove('active');
        }

        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.parentElement;
            if (list.classList.contains('active')) {
                list.classList.remove('active');
                card.classList.remove('active');
                return;
            }
            list.classList.add('active');
            card.classList.add('active');
            // No auto-scroll - manual only
        }

        function closeCategory(e, id) {
            e.stopPropagation();
            const list = document.getElementById(id);
            const card = list.parentElement;
            list.classList.remove('active');
            card.classList.remove('active');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            if (typeof ANIMA_DATA === 'undefined') return;

            // --- 1. Favorites Section ---
            const favoriteItems = [];
            ANIMA_DATA.categories.forEach(cat => {
                cat.items.forEach(item => {
                    const itemName = typeof item.name === 'object' ? (item.name[currentLang] || item.name.en) : item.name;
                    const itemKey = `${cat.id}-${itemName}`;
                    if (favorites.includes(itemKey)) {
                        favoriteItems.push({ ...item, categoryId: cat.id });
                    }
                });
            });

            if (favoriteItems.length > 0) {
                const favSection = document.createElement('div');
                favSection.className = 'favorites-section';
                favSection.innerHTML = `
                    <div class="favorites-title">
                        <i class="fas fa-heart"></i>
                        ${currentLang === 'ar' ? 'مفضلاتي' : 'My Favorites'}
                    </div>
                    <div class="items-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px;"></div>
                `;
                const favList = favSection.querySelector('.items-list');
                
                favoriteItems.forEach(item => {
                    const itemName = typeof item.name === 'object' ? (item.name[currentLang] || item.name.en) : item.name;
                    const itemKey = `${item.categoryId}-${itemName}`;
                    const menuItem = document.createElement('div');
                    menuItem.className = 'menu-item favorite-item';
                    menuItem.style.cssText = 'cursor: pointer; position: relative; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 20px;';
                    menuItem.onclick = () => showSpotlight(item, item.categoryId);

                    menuItem.innerHTML = `
                        <button class="favorite-btn active" onclick="toggleFavorite(event, '${itemKey}')" style="top: 5px; right: 5px; width: 30px; height: 30px; font-size: 12px;">
                            <i class="fas fa-heart"></i>
                        </button>
                        ${item.image ? `<div class="item-image-container" style="height: 100px;"><img src="${item.image}" alt="${itemName}" class="item-thumb"></div>` : ''}
                        <div class="item-header" style="margin-top: 10px;">
                            <div class="item-name" style="font-size: 0.9rem;">${itemName}</div>
                            <div class="item-price" style="font-size: 0.8rem;">${item.price}</div>
                        </div>
                    `;
                    favList.appendChild(menuItem);
                });
                container.appendChild(favSection);
            }

            // --- 2. Existing Dividers and Categories ---
            
            // Drinks divider
            const drinksDiv = document.createElement('div');
            drinksDiv.className = 'divider-card';
            const drinksImg = document.createElement('img');
            drinksImg.src = 'drinks/divider-drinks.png';
            drinksImg.className = 'divider-image';
            drinksImg.alt = 'Drinks';
            const drinksTitleEl = document.createElement('div');
            drinksTitleEl.className = 'divider-title';
            drinksTitleEl.textContent = currentLang === 'ar' ? 'المشروبات' : 'DRINKS';
            drinksDiv.appendChild(drinksImg);
            drinksDiv.appendChild(drinksTitleEl);
            drinksDiv.style.animation = 'slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) both';
            container.appendChild(drinksDiv);

            ANIMA_DATA.categories.forEach((category, index) => {
                // Food divider before pizza
                if (category.id === 'pizza') {
                    const foodDiv = document.createElement('div');
                    foodDiv.className = 'divider-card';
                    const foodImg = document.createElement('img');
                    foodImg.src = 'food/divider-food.png';
                    foodImg.className = 'divider-image';
                    foodImg.alt = 'Food';
                    const foodTitleEl = document.createElement('div');
                    foodTitleEl.className = 'divider-title';
                    foodTitleEl.textContent = currentLang === 'ar' ? 'المأكولات' : 'FOOD';
                    foodDiv.appendChild(foodImg);
                    foodDiv.appendChild(foodTitleEl);
                    foodDiv.style.animation = 'slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) both';
                    foodDiv.style.animationDelay = `${(index + 1) * 0.05}s`;
                    container.appendChild(foodDiv);
                }

                const fullWidthCategories = ['coffee-drinks', 'pizza'];
                const card = document.createElement('div');
                card.className = 'category-card' + (fullWidthCategories.includes(category.id) ? ' full-width' : '');
                card.id = 'card-' + category.id;
                card.style.animationDelay = `${(index + 2) * 0.05}s`;
                card.onclick = () => toggleCategory(category.id);

                // 3D Tilt Logic
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -10; // Max 10 deg tilt
                    const rotateY = ((x - centerX) / centerX) * 10;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });

                const banner = document.createElement('div');
                banner.className = 'category-card-banner';
                const titleDiv = document.createElement('div');
                titleDiv.className = 'category-title';
                titleDiv.textContent = category.title[currentLang] || category.title.en;
                banner.appendChild(titleDiv);
                card.appendChild(banner);

                const list = document.createElement('div');
                list.id = category.id;
                list.className = 'subcategory-list';
                list.onclick = (e) => e.stopPropagation();

                const closeHeader = document.createElement('div');
                closeHeader.className = 'close-header';
                const closeBtn = document.createElement('button');
                closeBtn.className = 'icon-close-btn';
                closeBtn.onclick = (e) => closeCategory(e, category.id);
                closeBtn.textContent = '×';
                closeHeader.appendChild(closeBtn);
                list.appendChild(closeHeader);

                category.items.forEach(item => {
                    const itemName = typeof item.name === 'object' ? (item.name[currentLang] || item.name.en) : item.name;
                    const itemKey = `${category.id}-${itemName}`;
                    const isFav = favorites.includes(itemKey);

                    const menuItem = document.createElement('div');
                    menuItem.className = 'menu-item';
                    menuItem.style.position = 'relative';
                    menuItem.style.cursor = 'pointer';
                    menuItem.onclick = () => showSpotlight(item, category.id);

                    menuItem.innerHTML = `
                        <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${itemKey}')">
                            <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                        </button>
                        ${item.image ? `<div class="item-image-container"><img src="${item.image}" alt="${itemName}" class="item-thumb" loading="lazy"></div>` : ''}
                        <div class="item-header">
                            <h3 class="item-name">${itemName}</h3>
                            <div class="item-price">${item.price}</div>
                        </div>
                        ${item.description ? `<div class="item-description">${item.description}</div>` : ''}
                    `;
                    list.appendChild(menuItem);
                });

                const closeSection = document.createElement('div');
                closeSection.className = 'close-section';
                const closeBtn2 = document.createElement('button');
                closeBtn2.className = 'close-btn';
                closeBtn2.onclick = (e) => closeCategory(e, category.id);
                closeBtn2.textContent = window.ANIMA_UI ? window.ANIMA_UI[currentLang].close : 'Close';
                closeSection.appendChild(closeBtn2);
                list.appendChild(closeSection);

                card.appendChild(list);
                container.appendChild(card);
            });
        }

        window.addEventListener('load', () => {
            applyLanguage();
            setTimeout(() => {
                document.getElementById('order-toast').classList.add('show');
            }, 2000);
        });
        // Sparkle Touch Effect
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }

        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.closest('#scratch-modal')) return;
            createSparkle(e.clientX, e.clientY);
        });

        // Music Logic
        let isPlaying = false;
        function toggleMusic() {
            const audio = document.getElementById('ambient-audio');
            const btn = document.getElementById('music-btn');
            const waves = document.getElementById('music-waves');
            if (isPlaying) {
                audio.pause();
                btn.innerHTML = '<i class="fas fa-music"></i>';
                btn.style.color = '#fff';
                btn.style.borderColor = 'rgba(255,255,255,0.2)';
                btn.style.animation = 'none';
                waves.classList.remove('playing');
            } else {
                audio.play().catch(e => console.log('Playback prevented', e));
                btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                btn.style.color = '#ffbc00';
                btn.style.borderColor = '#ffbc00';
                btn.style.animation = 'pulseGlow 2s infinite';
                waves.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }

        // Glowing Touch Trail Logic
        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'glow-trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 400);
        }

        let lastTrailTime = 0;
        document.addEventListener('mousemove', (e) => {
            const now = Date.now();
            if (now - lastTrailTime > 20) { // Throttle to 50fps
                createTrail(e.clientX, e.clientY);
                lastTrailTime = now;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const now = Date.now();
                if (now - lastTrailTime > 20) {
                    createTrail(e.touches[0].clientX, e.touches[0].clientY);
                    lastTrailTime = now;
                }
            }
        });

// Video background autoplay loop - no JS needed

        window.addEventListener('load', () => {
            setTimeout(() => {
                const pageEnter = document.getElementById('page-enter');
                if (pageEnter) {
                    pageEnter.classList.add('loaded');
                    setTimeout(() => pageEnter.remove(), 600);
                }
            }, 50);
        });

    </script>
</body>

</html>
