<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الأصناف - ANIMA Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            line-height: 1.6;
            background: #01164B;
            color: #fff; 
            direction: rtl;
            padding: 90px 20px 20px;
            min-height: 100vh;
        }

        /* Navbar */
        .top-navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .logo-container {
            cursor: pointer;
        }

        .navbar-logo {
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }

        .spacer { flex-grow: 1; }

        .menu-button {
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
            background: rgba(255,255,255,0.12);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .menu-button:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* Categories Grid */
.categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 1200px;
            margin: 20px auto 0;
        }

        .category-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.12);
            overflow: hidden;
        }

        .category-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.25);
        }

        .category-card.active {
            grid-column: 1 / -1;
            background: rgba(76,0,0,0.9);
            border-color: #fff;
        }

.category-card-banner {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            position: relative;
            overflow: hidden;
        }

        .category-card-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

.category-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
        }

        /* Menu Items - New Professional Layout */
        .subcategory-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s ease;
        }

        .subcategory-list.active {
            max-height: 4000px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.06);
            padding-left: 28px;
            padding-right: 28px;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-image-container {
            width: 100%;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .menu-item:hover .item-image-container {
            transform: scale(1.02);
        }

        .item-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .item-details {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
        }

        .item-name {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            margin: 0;
            line-height: 1.3;
        }

        .item-price {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #f4d03f, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(244,208,63,0.3);
            white-space: nowrap;
            margin-top: 8px;
        }

        .item-description {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            line-height: 1.5;
            margin: 8px 0;
            font-family: 'Cairo', sans-serif;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 80px 15px 15px; }
            .top-navbar { height: 65px; padding: 0 15px; }
            .navbar-logo { height: 40px; }
            .categories-grid { grid-template-columns: 1fr; gap: 16px; }
            .category-card-banner { height: 120px; }
            .category-title { font-size: 24px; }
            .menu-item { padding: 20px 16px; }
            .item-name { font-size: 20px; }
            .item-price { font-size: 18px; padding: 6px 16px; }
        }

        @media (max-width: 480px) {
            .menu-item { padding: 18px 12px; }
            .item-name { font-size: 18px; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="390c0c95-c085-4190-9d08-.png" alt="ANIMA Logo" class="navbar-logo">
            </div>
            <div class="spacer"></div>
            <a href="index.html" class="menu-button">الرئيسية</a>
        </div>
    </header>

    <div class="categories-container">
        <div class="categories-grid" id="menu-container"></div>
    </div>

    <script>
        function toggleCategory(id) {
            const list = document.getElementById(id);
            const card = list.closest('.category-card');
            list.classList.toggle('active');
            card.classList.toggle('active');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            if (!ANIMA_DATA?.categories) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;">جاري تحميل القائمة...</div>';
                return;
            }

            ANIMA_DATA.categories.forEach((category) => {
                let itemsHtml = category.items.map(item => `
                    <div class="menu-item">
                        <div class="item-image-container">
                            <img src="${item.image}" class="item-thumb" loading="lazy" alt="${item.name}">
                        </div>
                        <div class="item-details">
                            <h3 class="item-name">${item.name}</h3>
                            <p class="item-description">${item.description || 'وصف لذيذ للصنف'}</p>
                            <div class="item-price">${item.price}</div>
                        </div>
                    </div>
                `).join('');

                const cardHtml = `
                    <div class="category-card" onclick="toggleCategory('${category.id}')">
                        <div class="category-card-banner">
                            <h2 class="category-title">${category.title}</h2>
                        </div>
                        <div class="subcategory-list" id="${category.id}">
                            <div class="subcategory">${itemsHtml}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        window.addEventListener('load', renderMenu);
    </script>
</body>
</html>
