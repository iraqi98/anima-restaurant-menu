<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA CAFÉ & PIZZERIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Cairo:wght@400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="data_v2.js"></script>
    <style>
        /* Existing styles unchanged */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        /* ... all existing CSS from original ... */
        /* Add this at the end of <style> */
        .rising-emojis {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100vw;
            height: 120vh;
            pointer-events: none;
            z-index: -3;
            overflow: hidden;
        }
        .emoji-bubble {
            position: absolute;
            font-size: 28px;
            opacity: 0;
            animation: riseBottomToTop 8s linear infinite;
            pointer-events: none;
            user-select: none;
            filter: drop-shadow(0 2px 8px rgba(255,255,255,0.8));
        }
        @keyframes riseBottomToTop {
            0% { bottom: -60px; opacity: 0; transform: translateX(0) rotate(0deg) scale(0.5); }
            10% { opacity: 0.6; transform: translateX(0) rotate(3deg) scale(0.9); }
            50% { opacity: 0.4; }
            90% { opacity: 0.3; transform: translateX(40px) rotate(-3deg) scale(1.2); }
            100% { bottom: 120vh; opacity: 0; transform: translateX(60px) rotate(0deg) scale(1.5); }
        }
    </style>
</head>
<body>
    <!-- Existing HTML unchanged -->
    <div class="wave-container" id="music-waves">
        <div class="wave wave3"></div>
        <div class="wave wave2"></div>
        <div class="wave"></div>
    </div>
    <!-- Add emojis div here -->
    <div class="rising-emojis" id="risingEmojis"></div>
    <!-- ... rest of HTML unchanged ... -->
    <script>
        <!-- Existing script unchanged -->
        // Add at the end
        const cuteEmojis = ['☕','🍵','🥤','🍕','🥐','🍩','🍦','🍭','🍰','🌮','🍜'];
        function createRisingEmoji() {
            const bubble = document.createElement('div');
            bubble.className = 'emoji-bubble';
            bubble.textContent = cuteEmojis[Math.floor(Math.random() * cuteEmojis.length)];
            bubble.style.left = (Math.random() * 90 + 5) + '%';
            bubble.style.animationDuration = (6 + Math.random() * 3) + 's';
            bubble.style.animationDelay = Math.random() * 1 + 's';
            document.getElementById('risingEmojis').appendChild(bubble);
            setTimeout(() => bubble.remove(), 10000);
            console.log('Emoji created!');
        }
        setInterval(createRisingEmoji, 700);
        for(let i = 0; i < 6; i++) setTimeout(createRisingEmoji, i * 300);
        console.log('Rising emojis ready!');
    </script>
</body>
</html>
