<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA CAFÉ & PIZZERIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Cairo:wght@400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="data_v2.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        body { 
            font-family: 'Roboto', 'Cairo', sans-serif; 
            background: #01164B; 
            color: #fff; 
            line-height: 1.6; 
            direction: ltr; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            text-align: center; 
            position: relative; 
        }
        .logo { max-width: 250px; max-height: 180px; width: auto; height: auto; border-radius: 25px; margin-bottom: 30px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); animation: fadeIn 1.2s ease-out; }
        .menu-btn { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.3); color: #fff; padding: 20px 50px; border-radius: 60px; font-size: 1.6em; font-weight: 700; cursor: pointer; box-shadow: 0 15px 40px rgba(0,0,0,0.4); transition: all 0.4s ease; text-decoration: none; display: inline-block; margin-bottom: 50px; position: relative; overflow: hidden; }
        .menu-btn:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 25px 50px rgba(0,0,0,0.6); background: rgba(255,255,255,0.15); }
        .top-navbar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(1, 22, 75, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .navbar-logo { height: 45px; object-fit: contain; cursor: pointer; }
        .spacer { flex-grow: 1; }
        .nav-buttons { display: flex; gap: 12px; }
        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 700;
            background: rgba(255,255,255,0.08);
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        /* Social Footer */
        .social-footer {
            margin-top: auto;
            padding: 40px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .social-icon:hover {
            transform: translateY(-10px) scale(1.1);
            background: rgba(255,188,0,0.2);
            border-color: #ffbc00;
            box-shadow: 0 20px 50px rgba(255,188,0,0.3);
        }
        @media (max-width: 480px) {
            body { padding: 95px 8px; }
            .social-footer { padding: 30px 15px; gap: 15px; }
            .social-icon { width: 55px; height: 55px; font-size: 1.3rem; }
            .top-navbar { padding: 0 12px; }
            .nav-buttons { gap: 8px; }
            .menu-button { padding: 8px 14px; font-size: 0.8em; }
        }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-content">
            <!-- Logo removed -->
            <div class="spacer"></div>
            <div class="nav-buttons">
                <button id="lang-btn" class="menu-button" onclick="toggleLanguage()">AR</button>
            </div>
        </div>
    </header>

    <img src="Anmialogo..png" alt="ANIMA Logo" class="logo">
    <a href="menu.html" class="menu-btn" id="main-menu-btn">View Menu</a>
    
    <footer class="social-footer">
        <a href="https://www.instagram.com/anima.iqq?igsh=bGExN2oycjc3aTl4" class="social-icon" target="_blank" title="Instagram - ANIMA">
            <i class="fab fa-instagram"></i>
        </a>
    </footer>
    
    <script>
        let currentLang = localStorage.getItem('anima_lang') || 'en';

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'ar' : 'en';
            localStorage.setItem('anima_lang', currentLang);
            updateUI();
        }

    function updateUI() {
            const isAr = (currentLang === 'ar');
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').textContent = isAr ? 'EN' : 'AR';
            if(typeof ANIMA_UI !== 'undefined') {
                document.getElementById('main-menu-btn').textContent = ANIMA_UI[currentLang].viewMenu || 'View Menu';
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
