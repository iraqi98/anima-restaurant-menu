<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA CAFÉ & PIZZERIA</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Cairo:wght@400;600;700&family=Montserrat:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="data_v2.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 0 0 rgba(255, 188, 0, 0.4);
            }

            70% {
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 0 15px rgba(255, 188, 0, 0);
            }

            100% {
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 0 0 rgba(255, 188, 0, 0);
            }
        }

        body {
            font-family: 'Roboto', 'Cairo', sans-serif;
            background: #01164B;
            color: #fff;
            line-height: 1.6;
            direction: ltr;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .logo {
            max-width: 250px;
            max-height: 180px;
            width: auto;
            height: auto;
            border-radius: 25px;
            margin-bottom: 30px;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6));
            animation: fadeIn 1.2s ease-out, floatLogo 4s ease-in-out infinite 1.2s;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 1.6em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both, pulseGlow 3s infinite 1.4s;
        }

        .menu-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.15);
        }

        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: rgba(1, 22, 75, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar-logo {
            height: 45px;
            object-fit: contain;
            cursor: pointer;
        }

        .spacer {
            flex-grow: 1;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .menu-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Social Footer */
        .social-footer {
            margin-top: auto;
            padding: 40px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .social-icon:hover {
            transform: translateY(-10px) scale(1.1);
            background: rgba(255, 188, 0, 0.2);
            border-color: #ffbc00;
            box-shadow: 0 20px 50px rgba(255, 188, 0, 0.3);
        }

        .tiktok-original .tiktok-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
            filter: drop-shadow(0 4px 12px rgba(255, 0, 80, 0.4));
            animation: tiktokGlow 2s ease-in-out infinite alternate;
        }

        @keyframes tiktokGlow {
            from {
                filter: drop-shadow(0 4px 12px rgba(255, 0, 80, 0.4));
            }

            to {
                filter: drop-shadow(0 8px 20px rgba(255, 0, 80, 0.6));
            }
        }

        .social-icon:hover .tiktok-img {
            transform: rotate(360deg) scale(1.1);
        }

        /* Instagram Interactive */
        .instagram-interactive i {
            font-size: 2.2rem;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: instaGradient 3s ease infinite;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            filter: drop-shadow(0 4px 10px rgba(220, 39, 67, 0.3));
        }

        @keyframes instaGradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .social-icon.instagram-interactive:hover i {
            transform: scale(1.2) rotate(15deg);
            filter: drop-shadow(0 8px 15px rgba(220, 39, 67, 0.6));
        }


        .floating-emojis {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .emoji {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0;
            animation: floatEmoji linear infinite;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        @keyframes floatEmoji {
            0% {
                transform: translateY(110vh) rotate(0deg) scale(0.8);
                opacity: 0;
            }

            10% {
                opacity: 0.15;
            }

            90% {
                opacity: 0.15;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        .e1 {
            left: 5%;
            animation-duration: 18s;
            animation-delay: 0s;
        }

        .e2 {
            left: 15%;
            animation-duration: 22s;
            animation-delay: 3s;
        }

        .e3 {
            left: 25%;
            animation-duration: 16s;
            animation-delay: 7s;
        }

        .e4 {
            left: 35%;
            animation-duration: 25s;
            animation-delay: 1s;
        }

        .e5 {
            left: 45%;
            animation-duration: 19s;
            animation-delay: 5s;
        }

        .e6 {
            left: 55%;
            animation-duration: 21s;
            animation-delay: 2s;
        }

        .e7 {
            left: 65%;
            animation-duration: 17s;
            animation-delay: 8s;
        }

        .e8 {
            left: 75%;
            animation-duration: 23s;
            animation-delay: 4s;
        }

        .e9 {
            left: 85%;
            animation-duration: 20s;
            animation-delay: 6s;
        }

        .e10 {
            left: 90%;
            animation-duration: 24s;
            animation-delay: 9s;
        }

        .e11 {
            left: 40%;
            animation-duration: 18s;
            animation-delay: 10s;
        }

        .e12 {
            left: 60%;
            animation-duration: 26s;
            animation-delay: 0.5s;
        }

        /* Sparkle Effect */
        .sparkle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ffbc00;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ffbc00, 0 0 20px #ffbc00;
            animation: sparkleAnim 0.8s ease-out forwards;
            z-index: 9999;
        }

        @keyframes sparkleAnim {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -80px) scale(1.5);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -120px) scale(0);
                opacity: 0;
            }
        }

        /* Cinematic Wipe Transition */
        .circle-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #01164B;
            z-index: 99999;
            pointer-events: none;
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.7s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .circle-transition.active {
            clip-path: circle(150% at 50% 50%);
        }

        #parallax-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        #music-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            padding: 0;
            border-radius: 50%;
        }

        @media (max-width: 480px) {
            body {
                padding: 95px 8px;
            }

            .social-footer {
                padding: 30px 15px;
                gap: 15px;
            }

            .social-icon {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }

            .top-navbar {
                padding: 0 12px;
            }

            .nav-buttons {
                gap: 8px;
            }

            .menu-button {
                padding: 8px 14px;
                font-size: 0.8em;
            }

            #music-btn {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>

<body>
    <div class="floating-emojis">
        <span class="emoji e1">☕</span>
        <span class="emoji e2">🍵</span>
        <span class="emoji e3">🥤</span>
        <span class="emoji e4">🥭</span>
        <span class="emoji e5">🍓</span>
        <span class="emoji e6">🍊</span>
        <span class="emoji e7">🍕</span>
        <span class="emoji e8">🌮</span>
        <span class="emoji e9">🥗</span>
        <span class="emoji e10">🍰</span>
        <span class="emoji e11">🍫</span>
        <span class="emoji e12">🍍</span>
    </div>
    <header class="top-navbar">
        <div class="navbar-content">
            <!-- Logo removed -->
            <div class="spacer"></div>
            <div class="nav-buttons">
                <button id="music-btn" class="menu-button" onclick="toggleMusic()" title="Play Ambience">
                    <i class="fas fa-music"></i>
                </button>
                <button id="lang-btn" class="menu-button" onclick="toggleLanguage()">AR</button>
            </div>
        </div>
    </header>

    <div id="parallax-wrapper">
        <img src="Anmialogo..png" alt="ANIMA Logo" class="logo">
        <a href="menu.html" class="menu-btn" id="main-menu-btn">View Menu</a>
    </div>

    <audio id="ambient-audio" loop>
        <source
            src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3"
            type="audio/mpeg">
    </audio>

    <footer class="social-footer">
        <a href="https://www.instagram.com/anima.iqq?igsh=bGExN2oycjc3aTl4" class="social-icon instagram-interactive"
            target="_blank" title="Instagram - ANIMA">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://www.tiktok.com/@anima.iqq?_r=1&_t=ZS-95Yv81DVh0n" class="social-icon tiktok-original"
            target="_blank" title="TikTok - ANIMA">
            <img src="tiktok-icon.png" alt="TikTok" class="tiktok-img" loading="lazy">
        </a>
    </footer>

    <script>
        let currentLang = localStorage.getItem('anima_lang') || 'en';

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'ar' : 'en';
            localStorage.setItem('anima_lang', currentLang);
            updateUI();
        }

        function updateUI() {
            const isAr = (currentLang === 'ar');
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').textContent = isAr ? 'EN' : 'AR';
            if (window.ANIMA_UI) {
                document.getElementById('main-menu-btn').textContent = window.ANIMA_UI[currentLang].viewMenu || 'View Menu';
            }
        }

        // Music Logic
        let isPlaying = false;
        function toggleMusic() {
            const audio = document.getElementById('ambient-audio');
            const btn = document.getElementById('music-btn');
            if (isPlaying) {
                audio.pause();
                btn.innerHTML = '<i class="fas fa-music"></i>';
                btn.style.color = '#fff';
                btn.style.borderColor = 'rgba(255,255,255,0.2)';
            } else {
                audio.play().catch(e => console.log('Playback prevented', e));
                btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                btn.style.color = '#ffbc00';
                btn.style.borderColor = '#ffbc00';
            }
            isPlaying = !isPlaying;
        }

        // Parallax Effect
        const parallaxWrapper = document.getElementById('parallax-wrapper');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            parallaxWrapper.style.transform = `translate(${x}px, ${y}px)`;
        });

        window.addEventListener('deviceorientation', (e) => {
            if (!e.gamma || !e.beta) return;
            const x = (e.gamma / 45) * 15;
            const y = (e.beta / 45) * 15;
            parallaxWrapper.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Sparkle Touch Effect
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }

        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('a')) return;
            createSparkle(e.clientX, e.clientY);
        });

        document.getElementById('main-menu-btn').addEventListener('click', function (e) {
            e.preventDefault();
            const rect = this.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            const transition = document.createElement('div');
            transition.className = 'circle-transition';
            transition.style.clipPath = `circle(0% at ${x}px ${y}px)`;
            document.body.appendChild(transition);

            transition.offsetHeight; // Force reflow

            transition.classList.add('active');
            transition.style.clipPath = `circle(150% at ${x}px ${y}px)`;

            setTimeout(() => {
                window.location.href = this.href;
            }, 600);
        });

        window.onload = updateUI;
    </script>
</body>

</html>
