 <!DOCTYPE html>\n<html lang="en" dir="ltr">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https: data:; img-src 'self' data: https:;">\n    <title>Menu - ANIMA Event</title>\n    <link rel="preconnect" href="https://fonts.googleapis.com">\n    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>\n    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">\n    <script src="data_v2.js"></script>\n    <style>\n        * { box-sizing: border-box; margin: 0; padding: 0; }\n        \n        body { \n            font-family: 'Roboto', 'Cairo', sans-serif; \n            line-height: 1.5;\n            background: #01164B; \n            color: #fff;\n            overflow-x: hidden;\n            text-rendering: optimizeLegibility;\n            -webkit-font-smoothing: antialiased;\n            padding: 95px 10px 100px;\n            min-height: 100vh;\n        }\n\n        body::before {\n            content: '';\n            position: fixed;\n            top: 0; left: 0; width: 100%; height: 100%;\n            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.2) 0%, transparent 50%), \n                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.2) 0%, transparent 50%);\n            z-index: -1;\n        }\n\n        .top-navbar {\n            position: fixed;\n            top: 0; left: 0; width: 100%; height: 75px;\n            background: rgba(1, 22, 75, 0.85);\n            backdrop-filter: blur(25px);\n            -webkit-backdrop-filter: blur(25px);\n            border-bottom: 1px solid rgba(255, 255, 255, 0.1);\n            z-index: 1000;\n            display: flex;\n            align-items: center;\n            padding: 0 20px;\n        }\n\n        .navbar-content {\n            display: flex;\n            align-items: center;\n            width: 100%;\n            max-width: 1200px;\n            margin: 0 auto;\n        }\n\n        .navbar-logo { height: 45px; object-fit: contain; cursor: pointer; }\n\n        .spacer { flex-grow: 1; }\n\n        .nav-buttons { display: flex; gap: 12px; }\n\n        .menu-button {\n            color: #ffffff;\n            text-decoration: none;\n            font-size: 0.85em;\n            font-weight: 700;\n            background: rgba(255,255,255,0.08);\n            padding: 10px 18px;\n            border-radius: 20px;\n            border: 1px solid rgba(255,255,255,0.2);\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            cursor: pointer;\n            transition: all 0.2s ease;\n        }\n\n        .divider-card {\n            grid-column: span 2 !important;\n            background: rgba(255,255,255,0.08);\n            backdrop-filter: blur(15px);\n            border: 1px solid rgba(255,255,255,0.25);\n            border-radius: 28px;\n            height: 120px;\n            cursor: default;\n            user-select: none;\n            display: flex;\n            align-items: center;\n            padding: 0 25px;\n            gap: 20px;\n            margin-bottom: 8px;\n        }\n\n        .divider-image {\n            width: 85px;\n            height: 85px;\n            border-radius: 20px;\n            object-fit: cover;\n            box-shadow: 0 10px 30px rgba(0,0,0,0.4);\n            flex-shrink: 0;\n        }\n\n        .divider-title {\n            font-family: 'Montserrat', 'Cairo', sans-serif;\n            font-size: 1.5rem;\n            font-weight: 800;\n            color: #ffffff;\n            letter-spacing: 1.5px;\n            text-transform: uppercase;\n            line-height: 1.2;\n        }\n\n        .categories-grid {\n            display: grid;\n            grid-template-columns: repeat(2, 1fr);\n            gap: 12px;\n            margin-top: 5px;\n        }\n        \n        .category-card {\n            background: rgba(255, 255, 255, 0.04);\n            backdrop-filter: blur(12px);\n            border: 1px solid rgba(255, 255, 255, 0.1);\n            border-radius: 28px;\n            transition: all 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);\n            cursor: pointer;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n            scroll-margin-top: 100px;\n        }\n\n        .category-card.full-width { grid-column: span 2; }\n        \n        .category-card.active {\n            grid-column: span 2 !important;\n            background: rgba(255, 255, 255, 0.12);\n            border-color: rgba(255,255,255,0.4);\n        }\n\n        .category-card-banner {\n            height: 100px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            padding: 15px;\n        }\n        \n        .category-title {\n            font-family: 'Montserrat', 'Cairo', sans-serif;\n            font-size: 1.25rem;\n            font-weight: 800;\n            color: #ffffff;\n            text-align: center;\n            letter-spacing: 2px;\n            text-transform: uppercase;\n        }\n\n        .subcategory-list {\n            max-height: 0;\n            overflow: hidden;\n            transition: max-height 0.35s cubic-bezier(0.1, 0.7, 0.1, 1);\n            display: flex;\n            flex-direction: column;\n            position: relative;\n        }\n        .subcategory-list.active { max-height: 10000px; }\n        \n        .close-header {\n            display: flex;\n            justify-content: flex-end;\n            padding: 15px 25px 5px;\n        }\n        [dir="rtl"] .close-header { justify-content: flex-start; }\n\n        .icon-close-btn {\n            background: rgba(255,255,255,0.1);\n            border: 1px solid rgba(255,255,255,0.2);\n            color: #fff;\n            width: 35px;\n            height: 35px;\n            border-radius: 50%;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 20px;\n            cursor: pointer;\n        }\n\n        .menu-item {\n            padding: 25px 20px;\n            border-top: 1px solid rgba(255,255,255,0.08);\n            background: rgba(0,0,0,0.15);\n        }\n\n        .item-image-container {\n            width: 100%; height: 250px;\n            border-radius: 22px; overflow: hidden;\n            margin-bottom: 20px;\n            box-shadow: 0 12px 35px rgba(0,0,0,0.4);\n            border: 1px solid rgba(255,255,255,0.1);\n        }\n        .item-thumb { width:100%; height:100%; object-fit: cover; }\n\n        .item-header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 10px;\n            direction: rtl !important;\n        }\n\n        .item-name { font-size: 1.4rem; color: #fff; font-weight: 700; margin: 0; }\n        .item-price { font-size: 1.2rem; font-weight: 800; color: #ffbc00; }\n        .item-description {\n            font-family: 'Cairo', sans-serif;\n            font-size: 1rem;\n            color: rgba(255,255,255,0.8);\n            line-height: 1.6;\n            text-align: right !important;\n            direction: rtl !important;\n        }\n\n        .close-section {\n            padding: 30px;\n            display: flex;\n            justify-content: center;\n            background: rgba(0,0,0,0.3);\n            border-top: 1px solid rgba(255,255,255,0.1);\n        }\n\n        .close-btn {\n            background: rgba(255,255,255,0.12);\n            border: 2px solid rgba(255,255,255,0.2);\n            color: #fff;\n            padding: 14px 45px;\n            border-radius: 35px;\n            font-weight: 700;\n            font-size: 1.1em;\n            cursor: pointer;\n            text-transform: uppercase;\n        }\n\n        .order-toast {\n            position: fixed;\n            bottom: -100px;\n            left: 50%;\n            transform: translateX(-50%);\n            width: 90%;\n            max-width: 400px;\n            background: rgba(255, 255, 255, 0.1);\n            backdrop-filter: blur(20px);\n            -webkit-backdrop-filter: blur(20px);\n            border: 1px solid rgba(255, 255, 255, 0.2);\n            border-radius: 25px;\n            padding: 15px 20px;\n            display: flex;\n            align-items: center;\n            justify-content: space-between;\n            gap: 15px;\n            box-shadow: 0 15px 45px rgba(0,0,0,0.5);\n            z-index: 2000;\n            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n        }\n\n        .order-toast.show { bottom: 25px; }\n\n        .toast-content {\n            display: flex;\n            align-items: center;\n            gap: 12px;\n            font-size: 0.95rem;\n            font-weight: 600;\n        }\n\n        .toast-icon {\n            font-size: 1.4rem;\n        }\n\n        .toast-close {\n            background: none;\n            border: none;\n            color: rgba(255,255,255,0.6);\n            font-size: 1.5rem;\n            cursor: pointer;\n            line-height: 1;\n        }\n\n        @media (max-width: 480px) {\n            body { padding: 85px 8px 100px; }\n            .categories-grid { gap: 10px; margin-top: 0; }\n            .category-title { font-size: 1.1rem; }\n            .item-image-container { height: 200px; }\n            .order-toast { width: 95%; padding: 10px 16px; }\n            .toast-content { font-size: 0.8rem; }\n            .top-navbar { padding: 0 12px; }\n        }\n    </style>\n</head>\n<body>\n    <header class="top-navbar">\n        <div class="navbar-content">\n            <div class="logo-container" onclick="window.location.href='index.html'">\n                <img src="Anmialogo..png" alt="ANIMA Logo" class="navbar-logo">\n            </div>\n            <div class="spacer"></div>\n            <div class="nav-buttons">\n                <button id="lang-btn" class="menu-button" onclick="toggleLanguage()">AR</button>\n                <a href="index.html" id="home-link" class="menu-button">Home</a>\n            </div>\n        </div>\n    </header>\n\n    <div class="container">\n        <div class="categories-grid" id="menu-container"></div>\n    </div>\n\n    <!-- Floating Info Bar -->\n    <div id="order-toast" class="order-toast">\n        <div class="toast-content">\n            <span class="toast-icon">🛎️</span>\n            <span id="toast-text">Please place your order at the cashier</span>\n        </div>\n        <button class="toast-close" onclick="dismissToast()">×</button>\n    </div>\n\n    <script>\n        let currentLang = localStorage.getItem('anima_lang') || 'en';\n\n        function toggleLanguage() {\n            currentLang = (currentLang === 'en') ? 'ar' : 'en';\n            localStorage.setItem('anima_lang', currentLang);\n            updateUI();\n        }\n\n        function updateUI() {\n            const isAr = (currentLang === 'ar');\n            document.documentElement.lang = currentLang;\n            document.documentElement.dir = isAr ? 'rtl' : 'ltr';\n            document.getElementById('lang-btn').textContent = isAr ? 'EN' : 'AR';\n            \n            if(typeof ANIMA_UI !== 'undefined') {\n                document.getElementById('home-link').textContent = ANIMA_UI[currentLang].home;\n                document.getElementById('toast-text').textContent = ANIMA_UI[currentLang].orderTip;\n            }\n            renderMenu();\n        }\n\n        function dismissToast() {\n            document.getElementById('order-toast').classList.remove('show');\n        }\n\n        function toggleCategory(id) {\n            const list = document.getElementById(id);\n            const card = list.parentElement;\n            if(list.classList.contains('active')) {\n                list.classList.remove('active');\n                card.classList.remove('active');\n                return;\n            }\n            document.querySelectorAll('.subcategory-list.active').forEach(item => {\n                item.classList.remove('active');\n                item.parentElement.classList.remove('active');\n            });\n            list.classList.add('active');\n            card.classList.add('active');\n            setTimeout(() => {\n                card.scrollIntoView({ behavior: 'smooth', block: 'start' });\n            }, 100);\n        }\n\n        function closeCategory(e, id) {\n            e.stopPropagation();\n            const list = document.getElementById(id);\n            const card = list.parentElement;\n            list.classList.remove('active');\n            card.classList.remove('active');\n            card.scrollIntoView({ behavior: 'smooth', block: 'center' });\n        }\n\n        function renderMenu() {\n            const container = document.getElementById('menu-container');\n            container.innerHTML = '';\n\n            // Drinks divider (CSP-safe)\n            const drinksTitle = currentLang === 'ar' ? 'المشروبات' : 'DRINKS';\n            const drinksDiv = document.createElement('div');\n            drinksDiv.className = 'divider-card';\n            const drinksImg = document.createElement('img');\n            drinksImg.src = 'drinks/divider-drinks.png';\n            drinksImg.className = 'divider-image';\n            drinksImg.alt = 'Drinks';\n            const drinksTitleEl = document.createElement('div');\n            drinksTitleEl.className = 'divider-title';\n            drinksTitleEl.textContent = drinksTitle;\n            drinksDiv.appendChild(drinksImg);\n            drinksDiv.appendChild(drinksTitleEl);\n            container.appendChild(drinksDiv);\n\n            if (typeof ANIMA_DATA === 'undefined') return;\n\n            ANIMA_DATA.categories.forEach((category, index) => {\n                // Food divider before pizza (index 4)\n                if (index === 4) {\n                    const foodTitle = currentLang === 'ar' ? 'المأكولات' : 'FOOD';\n                    const foodDiv = document.createElement('div');\n                    foodDiv.className = 'divider-card';\n                    const foodImg = document.createElement('img');\n                    foodImg.src = 'food/divider-food.png';\n                    foodImg.className = 'divider-image';\n                    foodImg.alt = 'Food';\n                    const foodTitleEl = document.createElement('div');\n                    foodTitleEl.className = 'divider-title';\n                    foodTitleEl.textContent = foodTitle;\n                    foodDiv.appendChild(foodImg);\n                    foodDiv.appendChild(foodTitleEl);\n                    container.appendChild(foodDiv);\n                }\n\n                const card = document.createElement('div');\n                card.className = 'category-card' + (index % 3 === 0 ? ' full-width' : '');\n                card.id = 'card-' + category.id;\n                card.onclick = () => toggleCategory(category.id);\n\n                const banner = document.createElement('div');\n                banner.className = 'category-card-banner';\n                const titleDiv = document.createElement('div');\n                titleDiv.className = 'category-title';\n                titleDiv.textContent = category.title[currentLang];\n                banner.appendChild(titleDiv);\n                card.appendChild(banner);\n\n                const list = document.createElement('div');\n                list.id = category.id;\n                list.className = 'subcategory-list';\n                list.onclick = (e) => e.stopPropagation();\n\n                const closeHeader = document.createElement('div');\n                closeHeader.className = 'close-header';\n                const closeBtn = document.createElement('button');\n                closeBtn.className = 'icon-close-btn';\n                closeBtn.onclick = (e) => closeCategory(e, category.id);\n                closeBtn.textContent = '×';\n                closeHeader.appendChild(closeBtn);\n                list.appendChild(closeHeader);\n\n                category.items.forEach(item => {\n                    const menuItem = document.createElement('div');\n                    menuItem.className = 'menu-item';\n\n                    if (item.image) {\n                        const imgContainer = document.createElement('div');\n                        imgContainer.className = 'item-image-container';\n                        const img = document.createElement('img');\n                        img.src = item.image;\n                        img.className = 'item-thumb';\n                        img.loading = 'lazy';\n                        imgContainer.appendChild(img);\n                        menuItem.appendChild(imgContainer);\n                    }\n\n                    const header = document.createElement('div');\n                    header.className = 'item-header';\n                    const nameH3 = document.createElement('h3');\n                    nameH3.className = 'item-name';\n                    nameH3.textContent = item.name;\n                    const priceDiv = document.createElement('div');\n                    priceDiv.className = 'item-price';\n                    priceDiv.textContent = item.price;\n                    header.appendChild(nameH3);\n                    header.appendChild(priceDiv);\n                    menuItem.appendChild(header);\n\n                    if (item.description) {\n                        const descP = document.createElement('p');\n                        descP.className = 'item-description';\n                        descP.textContent = item.description;\n                        menuItem.appendChild(descP);\n                    }\n                    list.appendChild(menuItem);\n                });\n\n                const closeSection = document.createElement('div');\n                closeSection.className = 'close-section';\n                const closeBtn2 = document.createElement('button');\n                closeBtn2.className = 'close-btn';\n                closeBtn2.onclick = (e) => closeCategory(e, category.id);\n                closeBtn2.textContent = ANIMA_UI ? (ANIMA_UI[currentLang]?.close || 'Close') : 'Close';\n                closeSection.appendChild(closeBtn2);\n                list.appendChild(closeSection);\n\n                card.appendChild(list);\n                container.appendChild(card);\n            });\n        }\n        \n        window.onload = () => {\n            updateUI();\n            setTimeout(() => {\n                document.getElementById('order-toast').classList.add('show');\n            }, 2000);\n        };\n    </script>\n</body>\n</html>
